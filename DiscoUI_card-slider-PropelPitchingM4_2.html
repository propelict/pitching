<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Slider</title>
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  CARD SLIDER — USAGE INSTRUCTIONS                           ║
  ╚══════════════════════════════════════════════════════════════╝

  EMBEDDING IN AN IFRAME
  ───────────────────────
    <iframe src="card-slider.html"
            width="100%"
            height="640"
            frameborder="0"
            allowtransparency="true">
    </iframe>

  EDITING CARD CONTENT
  ──────────────────────
  All content is in the CONTENT section at the top of the
  <script> block. Each card has:
    title  — the card heading
    image  — path to your image file, e.g. '1_in-person.svg'
              Leave as '' to show the placeholder graphic.
    body   — the body text below the image

  LAYOUT
  ──────
  Desktop: nav arrows flank the card on left and right.
  Mobile (container < 480px): arrows move to a top bar
  flanking the counter. Layout switches via JS class.

  FILES REQUIRED IN THE SAME FOLDER
  ────────────────────────────────────
  card-slider.html, 1_in-person.svg, 2_online.svg, 3_informal.svg
-->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #fff;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: unset;
    padding: 16px;
  }

  .container {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  /* ── Desktop counter (hidden on mobile) */
  .card-counter {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #6b7280;
  }

  /* ── Mobile top nav: arrows flank counter (hidden on desktop) */
  .top-nav {
    display: none;
    width: 100%;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .top-nav-counter {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #6b7280;
    flex: 1;
    text-align: center;
  }

  /* ── Main row: [prev] [scene] [next] */
  .main-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* Nav buttons */
  .nav-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1.5px solid #e5e7eb;
    background: #ffffff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    color: #374151;
    transition: border-color 0.15s, color 0.15s, transform 0.15s;
  }

  .nav-btn:hover:not(:disabled) {
    border-color: #2563eb;
    color: #2563eb;
    transform: scale(1.06);
  }

  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* Scene — clips the animation */
  .scene {
    flex: 1;
    position: relative;
    overflow: hidden;
    border-radius: 16px;
    /* height set by JS */
  }

  /* Individual card */
  .card {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    border-radius: 16px;
    padding: 24px 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transform: translateX(110%) rotate(6deg);
    opacity: 0;
    transition:
      transform 0.55s cubic-bezier(0.22, 1, 0.36, 1),
      opacity   0.55s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform, opacity;
  }

  .card.is-active   { transform: translateX(0) rotate(0deg); opacity: 1; }
  .card.exit-left   { transform: translateX(-110%) rotate(-6deg); opacity: 0; }
  .card.exit-right  { transform: translateX(110%) rotate(6deg); opacity: 0; }

  .card.enter-from-right {
    transform: translateX(110%) rotate(6deg);
    opacity: 0; transition: none;
  }
  .card.enter-from-left {
    transform: translateX(-110%) rotate(-6deg);
    opacity: 0; transition: none;
  }

  /* Card image */
  .card-image {
    width: 100%;
    height: 200px;
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-image img {
    width: auto;
    height: 144px;
    object-fit: contain;
    display: block;
  }

  /* Card text */
  .card-title {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.3;
  }

  .card-body {
    font-size: 14px;
    line-height: 1.7;
    font-weight: 400;
  }

  /* Progress dots */
  .dots {
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: center;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #d1d5db;
    transition: background 0.2s, transform 0.2s;
    cursor: pointer;
  }

  .dot.active {
    background: #2563eb;
    transform: scale(1.4);
  }

  /* ── Mobile overrides via JS .is-mobile class ────────────── */
  .container.is-mobile .card-counter     { display: none; }
  .container.is-mobile .top-nav          { display: flex; }
  .container.is-mobile .main-row .nav-btn { display: none; }
  .container.is-mobile .scene            { flex: none; width: 100%; }

  @media (max-width: 500px) {
    body { padding: 12px; }
    .card-image { height: 160px; }
    .card-image img { height: 120px; }
    .card-title { font-size: 16px; }
    .card-body  { font-size: 13px; line-height: 1.6; }
  }

  /* ── Launch button ── */
  .launch-bar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 14px;
  }

  .launch-btn {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: #9ca3af;
    background: none;
    border: 1.5px solid #e5e7eb;
    border-radius: 50px;
    padding: 5px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: border-color 0.2s ease, color 0.2s ease;
    text-decoration: none;
  }

  .launch-btn:hover {
    border-color: #2563eb;
    color: #2563eb;
  }

  .launch-icon {
    width: 11px;
    height: 11px;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="container" id="container">
  <!-- ── Launch button ──────────────────────────────────────────────────────
       Update the href below if the file is moved to a new location.
       ───────────────────────────────────────────────────────────────────── -->
  <div class="launch-bar">
    <a class="launch-btn"
       href="https://esthertester-git.github.io/hypeRepo/DiscoUI_card-slider-PropelPitchingM4_2.html?standalone=true"
       target="_blank"
       rel="noopener noreferrer">
      <svg class="launch-icon" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 2H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M8 1h3v3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M11 1L6 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      Open in new window
    </a>
  </div>


  <!-- Desktop counter -->
  <div class="card-counter">
    Situation <span id="current-num">1</span> of <span id="total-num">3</span>
  </div>

  <!-- Mobile top nav -->
  <div class="top-nav" id="top-nav">
    <button class="nav-btn" id="prev-btn-m" disabled aria-label="Previous">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 12.5L5.5 8L10 3.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <span class="top-nav-counter">Situation <span id="current-num-m">1</span> of <span id="total-num-m">3</span></span>
    <button class="nav-btn" id="next-btn-m" aria-label="Next">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M6 3.5L10.5 8L6 12.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- Main row -->
  <div class="main-row">
    <button class="nav-btn" id="prev-btn" disabled aria-label="Previous">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 12.5L5.5 8L10 3.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="scene" id="scene"></div>
    <button class="nav-btn" id="next-btn" aria-label="Next">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M6 3.5L10.5 8L6 12.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- Dots always below, never inside main-row -->
  <div class="dots" id="dots"></div>

</div>

<script>
    // ─── COLOUR SCHEMES (cycles through cards) ───────────────────
  const colorSchemes = [
    {
      bg:        '#ffffff',
      border:    '1px solid #e5e7eb',
      shadow:    '0 1px 3px rgba(0,0,0,0.05), 0 8px 24px rgba(0,0,0,0.08)',
      title:     '#111827',
      body:      '#6b7280',
      imgBg:     '#f3f4f6',
      imgIcon:   '#d1d5db',
      imgLabel:  '#9ca3af',
    },
    {
      bg:        '#2563eb',
      border:    '1px solid #2563eb',
      shadow:    '0 1px 3px rgba(37,99,235,0.2), 0 8px 24px rgba(37,99,235,0.35)',
      title:     '#ffffff',
      body:      'rgba(255,255,255,0.78)',
      imgBg:     'rgba(255,255,255,0.14)',
      imgIcon:   'rgba(255,255,255,0.5)',
      imgLabel:  'rgba(255,255,255,0.45)',
    },
    {
      bg:        '#eff6ff',
      border:    '1px solid #bfdbfe',
      shadow:    '0 1px 3px rgba(0,0,0,0.04), 0 8px 24px rgba(37,99,235,0.1)',
      title:     '#1e3a8a',
      body:      '#374151',
      imgBg:     '#bfdbfe',
      imgIcon:   '#93c5fd',
      imgLabel:  '#60a5fa',
    },
  ];

  // ─── CONTENT ────────────────────────────────────────────────
  const items = [
    {
      title: 'In-person',
      image: '1_in-person.svg',
      body:  'An in-person presentation gives you the most tools to work with: your full body language, the energy of the room, and direct eye contact. Stand when you can, move purposefully, and pay attention to how your audience is responding. Arrive early enough to check the room, test your slides, and give yourself a few quiet minutes to prepare.'
    },
    {
      title: 'Online',
      image: '2_online.svg',
      body:  'Online presentations require extra attention to a few things that are easy to overlook. Look directly at your camera, not at the faces on your screen. Position your camera at eye level, make sure your lighting is in front of you, and check that your audio is clear. Speak slightly more slowly than you would in person and build in slightly longer pauses after key points.'
    },
    {
      title: 'Informal or conversational',
      image: '3_informal.svg',
      body:  'Aim for a natural, conversational tone rather than a polished performance. Start with your one-liner and let the other person\'s response guide where you go next. The goal is engagement, not completion.'
    },
  ];

  // ─────────────────────────────────────────────────────────────

  let currentIndex = 0;
  let isAnimating  = false;
  const total      = items.length;

  const container = document.getElementById('container');
  const scene     = document.getElementById('scene');
  const dotsEl    = document.getElementById('dots');
  const prevBtn   = document.getElementById('prev-btn');
  const nextBtn   = document.getElementById('next-btn');
  const prevBtnM  = document.getElementById('prev-btn-m');
  const nextBtnM  = document.getElementById('next-btn-m');

  document.getElementById('total-num').textContent   = total;
  document.getElementById('total-num-m').textContent = total;

  // ── Build cards ─────────────────────────────────────────────
  items.forEach((item, i) => {
    const scheme = colorSchemes[i % colorSchemes.length];
    const card   = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + i;

    let imageHTML;
    if (item.image) {
      imageHTML = `<div class="card-image" style="background:${scheme.imgBg}">
        <img src="${item.image}" alt="${item.title}">
      </div>`;
    } else {
      imageHTML = `<div class="card-image" style="background:${scheme.imgBg};display:flex;align-items:center;justify-content:center;">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect x="4" y="8" width="32" height="24" rx="3" stroke="${scheme.imgIcon}" stroke-width="1.5"/>
          <circle cx="14" cy="17" r="3" stroke="${scheme.imgIcon}" stroke-width="1.5"/>
          <path d="M4 26l8-6 6 5 5-4 9 7" stroke="${scheme.imgIcon}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>`;
    }

    card.innerHTML = `
      <div class="card-title" style="color:${scheme.title}">${item.title}</div>
      ${imageHTML}
      <div class="card-body" style="color:${scheme.body}">${item.body}</div>
    `;
    card.style.background = scheme.bg;
    card.style.border      = scheme.border;
    card.style.boxShadow   = scheme.shadow;
    scene.appendChild(card);
  });

  // ── Build dots ───────────────────────────────────────────────
  items.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.id = 'dot-' + i;
    dot.onclick = () => { if (!isAnimating && i !== currentIndex) navigate(i > currentIndex ? 'next' : 'prev', i); };
    dotsEl.appendChild(dot);
  });

  // ── Layout: JS toggles .is-mobile based on container width ──
  function applyLayout() {
    container.classList.toggle('is-mobile', container.offsetWidth < 480);
  }

  // ── Scene height: measure tallest card ──────────────────────
  function setSceneHeight() {
    const sceneW = scene.offsetWidth;
    if (!sceneW) return;
    let maxH = 0;
    document.querySelectorAll('.card').forEach(card => {
      const clone = card.cloneNode(true);
      clone.style.cssText = [
        'position:fixed', 'visibility:hidden', 'pointer-events:none',
        'top:-9999px', 'left:0',
        'width:' + sceneW + 'px', 'height:auto',
        'transform:none', 'opacity:1', 'display:flex'
      ].join(';');
      document.body.appendChild(clone);
      maxH = Math.max(maxH, clone.offsetHeight);
      document.body.removeChild(clone);
    });
    scene.style.height = Math.max(maxH, 200) + 'px';
  }

  // Run layout first so scene has correct width before measuring
  applyLayout();
  setSceneHeight();
  document.fonts.ready.then(setSceneHeight);
  window.addEventListener('resize', () => { applyLayout(); setSceneHeight(); });

  // ── Navigation ───────────────────────────────────────────────
  function navigate(direction, targetIndex) {
    if (isAnimating) return;
    const newIndex = targetIndex !== undefined
      ? targetIndex
      : direction === 'next' ? currentIndex + 1 : currentIndex - 1;
    if (newIndex < 0 || newIndex >= total) return;
    isAnimating = true;

    const outgoing = document.getElementById('card-' + currentIndex);
    const incoming = document.getElementById('card-' + newIndex);

    incoming.classList.add(direction === 'next' ? 'enter-from-right' : 'enter-from-left');
    incoming.offsetHeight;
    incoming.classList.remove('enter-from-right', 'enter-from-left');
    outgoing.classList.remove('is-active');
    outgoing.classList.add(direction === 'next' ? 'exit-left' : 'exit-right');
    incoming.classList.add('is-active');

    currentIndex = newIndex;
    updateUI();

    setTimeout(() => {
      outgoing.classList.remove('exit-left', 'exit-right');
      isAnimating = false;
    }, 580);
  }

  function updateUI() {
    const n = currentIndex + 1;
    document.getElementById('current-num').textContent   = n;
    document.getElementById('current-num-m').textContent = n;
    prevBtn.disabled  = currentIndex === 0;
    nextBtn.disabled  = currentIndex === total - 1;
    prevBtnM.disabled = currentIndex === 0;
    nextBtnM.disabled = currentIndex === total - 1;
    document.querySelectorAll('.dot').forEach((d, i) =>
      d.classList.toggle('active', i === currentIndex));
  }

  prevBtn.addEventListener('click',  () => navigate('prev'));
  nextBtn.addEventListener('click',  () => navigate('next'));
  prevBtnM.addEventListener('click', () => navigate('prev'));
  nextBtnM.addEventListener('click', () => navigate('next'));

  // ── Initialise ───────────────────────────────────────────────
  document.getElementById('card-0').classList.add('is-active');
  updateUI();
</script>
<script>
  // Hide the launch button when the page is opened in a new window.
  // The launch button link appends ?standalone=true to the URL, which
  // triggers this check. Update the parameter name below if needed.
  if (new URLSearchParams(window.location.search).get('standalone') === 'true') {
    document.querySelector('.launch-bar').style.display = 'none';
  }
</script>
</body>
</html>
